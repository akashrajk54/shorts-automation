name: Daily YouTube Short

# Runs the whole pipeline on a schedule (free on GitHub Actions) and can also
# be triggered manually from the Actions tab ("Run workflow").
on:
  # Timing is driven EXTERNALLY by cron-job.org (free), which calls GitHub's
  # workflow_dispatch API at precise IST times (12:30 / 15:30 / 21:30 Asia/Kolkata).
  # We deliberately do NOT use GitHub's built-in `schedule:` cron because it runs
  # best-effort (delayed up to ~2h) AND would double-fire alongside cron-job.org,
  # causing duplicate uploads. workflow_dispatch runs near-immediately when called.
  workflow_dispatch: {}

# Avoid two runs overlapping if a previous one is still going.
concurrency:
  group: daily-short
  cancel-in-progress: false

permissions:
  contents: write   # allows committing history.json back to remember past topics

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # --- Secrets (add these under Settings -> Secrets and variables -> Actions) ---
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Free token from https://auth.pollinations.ai - raises image rate limits
      # so generation works from GitHub's shared/data-center IPs.
      POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
      # Free Pexels key (https://www.pexels.com/api/) - reliable image fallback
      # from cloud IPs when Pollinations fails or runs out of Pollen.
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      # --- Config (override via repo Variables if you like) ---
      VIDEO_LANGUAGE: ${{ vars.VIDEO_LANGUAGE || 'hindi' }}
      # Target audience: curious Indian AI beginners (18-30, students + early-career).
      # 'tips' = one confident narrator giving a punchy, real, actionable AI tip
      # (matches search intent + higher completion than the kids-story format).
      PROMPT_STYLE: ${{ vars.PROMPT_STYLE || 'tips' }}
      NICHE: ${{ vars.NICHE || 'AI & tech tools that make everyday life easier' }}
      AUTO_UPLOAD: "true"
      YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
      BACKGROUND_MUSIC: "true"
      # Hybrid visuals (real stock video + AI images). Toggle off with a repo Variable.
      STOCK_VIDEO: ${{ vars.STOCK_VIDEO || 'true' }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      # Voice: set repo Variable VOICE_PROVIDER=elevenlabs to use the realistic
      # paid voice, and add the ELEVENLABS_* secrets/variables below.
      VOICE_PROVIDER: ${{ vars.VOICE_PROVIDER || 'edge' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_MODEL: ${{ vars.ELEVENLABS_MODEL || 'eleven_multilingual_v2' }}
      ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_VOICE_GIRL: ${{ vars.ELEVENLABS_VOICE_GIRL }}
      ELEVENLABS_VOICE_BOY: ${{ vars.ELEVENLABS_VOICE_BOY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg + fonts (Devanagari/Indic/CJK for captions)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu-core fonts-noto-core fonts-noto-cjk
          sudo fc-cache -f

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write YouTube OAuth files from secrets
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          printf '%s' "$CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$TOKEN_JSON" > token.json
          test -s client_secret.json || (echo "client_secret.json empty; set CLIENT_SECRET_JSON secret" && exit 1)
          test -s token.json || (echo "token.json empty; set TOKEN_JSON secret" && exit 1)

      - name: Generate, build, and upload the Short
        run: python main.py

      - name: Persist topic history (so themes don't repeat)
        if: always()
        run: |
          if [ -f history.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f history.json
            git commit -m "chore: update topic history [skip ci]" || echo "no history changes"
            git push || echo "history push skipped"
          fi
